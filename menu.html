<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La carte — Passione Italiana Bordeaux</title>
<meta name="description" content="Découvrez notre carte : aperitivo napoletano, taglieri, pâtes fraîches, panuozzo et plats du jour faits maison à Bordeaux.">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
  <!-- Header avec "La carte" actif -->
</header>

<section class="hero page-hero">
  <img src="images/hero.svg" alt="" class="hero-bg">
  <div class="container hero-inner">
    <span class="eyebrow" data-fr="La carte" data-en="The menu">La carte</span>
    <h1 data-fr="Cucina semplice, prodotti veri" data-en="Simple cooking, real ingredients">Cucina semplice, prodotti veri</h1>
    <p class="hero-sub" data-fr="Une carte courte qui suit les arrivages : aperitivo napoletano, planches de charcuterie et fromages, pâtes fraîches du jour, panuozzo et plats faits maison." data-en="A short menu that follows the deliveries: Neapolitan aperitivo, sharing boards, fresh pasta of the day, panuozzo and home-made dishes.">Une carte courte qui suit les arrivages...</p>
  </div>
</section>

<section class="menu-section">
  <div class="container">
    <!-- Votre section menu existante avec onglets -->
    <div class="menu-tabs reveal">
      <button class="menu-tab active" data-tab="aperitivo" data-fr="Aperitivo" data-en="Aperitivo">Aperitivo</button>
      <button class="menu-tab" data-tab="taglieri" data-fr="Taglieri" data-en="Sharing boards">Taglieri</button>
      <!-- ... -->
    </div>

    <!-- Tous vos menu-panel existants -->
    <div class="menu-panel active reveal" data-panel="aperitivo">...</div>
    <div class="menu-panel" data-panel="taglieri">...</div>
    <!-- ... -->

    <p class="menu-note" data-fr="Carte non contractuelle et donnée à titre indicatif — les plats et les prix évoluent selon les arrivages de nos petits producteurs italiens." data-en="This menu is indicative and may change — dishes and prices depend on deliveries from our small Italian producers.">Carte non contractuelle...</p>
  </div>
</section>

<footer class="site-footer">...</footer>
<script src="js/script.js"></script>
</body>
</html>
